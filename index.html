<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sylviapuffs</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #ffffff;
            font-family: "Times New Roman", Times, serif;
            text-align: center;
        }
        .content-wrapper {
            margin-top: 10vh;
            max-width: 800px;
            padding: 20px;
        }
        img {
            width: 300px; /* Adjust size as needed */
            height: auto;
            margin-bottom: 40px;
        }
        h2 {
            font-size: 1.5rem;
            margin-top: 30px;
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
        }
        .link-group {
            margin-bottom: 50px;
        }
        a {
            display: block;
            margin: 15px 0;
            color: #000;
            text-decoration: underline;
            font-size: 1.2rem;
        }
        .address {
            word-wrap: break-word;
            font-style: italic;
            margin-top: 10px;
            display: block;
        }
    </style>
</head>
<body>
    <div class="content-wrapper">
        <img src="Bow1440.png" alt="Logo">
        
        <div class="link-group">
            <h2>Social</h2>
            <a href="https://twitter.com/your-username">Twitter</a>
            <a href="https://github.com/your-username">GitHub</a>
        </div>

        <div class="link-group">
            <h2>Support</h2>
            <a href="https://ko-fi.com/your-username">Ko-fi</a>
            <div>
                <strong>BTC:</strong>
                <span class="address">your-bitcoin-wallet-address</span>
            </div>
        </div>
    </div>
</body>
</html>
