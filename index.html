<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sylviapuffs</title>
    <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400&display=swap" rel="stylesheet">
    <style>
        :root {
            --text-color: #5C4033;
            --title-color: #3E2C23;
            --link-dec-color: #EADDCA;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            color: var(--text-color);
            font-family: 'Pixelify Sans', monospace;
            font-weight: 400;
            font-style: normal;
            font-size: 2rem;
            text-align: center;
            text-transform: lowercase;
        }

        .container {
            margin-top: 10vh;
            max-width: 600px;
            padding: 20px;
        }

        img {
            width: 300px;
            height: auto;
            margin-bottom: 80px;
        }

        h2 {
            font-size: 2rem;
            color: var(--title-color);
            font-weight: 400;
            margin-bottom: 20px;
            margin-top: 0;
        }

        .links-group {
            margin-bottom: 80px;
        }

        a {
            display: block;
            margin: 10px 0;
            color: inherit;
            text-decoration: none;
        }

        .dec {
            color: var(--link-dec-color);
        }

        .btc-wrapper {
            margin-top: 10px;
        }

        .btc-address {
            display: block;
            font-size: 2rem;
            max-width: 100%;
            word-break: break-all;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="Bow1440.png" alt="logo">
        
        <div class="links-group">
            <h2>socials:</h2>
            <a href="https://x.com/sylviapuffs" target="_blank">
                <span class="dec">/link/</span>twitter<span class="dec">/*link/</span>
            </a>
            <a href="https://github.com/BunPuffs" target="_blank">
                <span class="dec">/link/</span>github<span class="dec">/*link/</span>
            </a>
        </div>

        <div class="links-group">
            <h2>support me:</h2>
            <a href="https://ko-fi.com/sylviapuffs" target="_blank">
                <span class="dec">/link/</span>ko-fi<span class="dec">/*link/</span>
            </a>
            <div class="btc-wrapper">
                btc:<br>
                <span class="btc-address">bc1qvks7cr3tgz6ntgqse6xjwtc8jkpkupzcax6xkt</span>
            </div>
        </div>
    </div>
</body>
</html>
