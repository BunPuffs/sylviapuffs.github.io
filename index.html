<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sylvia Puffs</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #F7F2EE;
            --text-color: #5C4033;
            --title-color: #4A3529;
            --link-dec-color: #EADDCA;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";
            font-weight: 200;
            font-size: 1.125rem; 
            text-align: center;
            text-transform: lowercase;
            font-style: normal;
        }

        .container {
            margin-top: 10vh; 
            max-width: 600px;
            padding: 20px;
        }

        img {
            width: 200px; 
            height: auto;
            margin-bottom: 40px;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }

        h2 {
            font-size: 1.125rem;
            color: var(--title-color);
            font-weight: 200;
            margin-bottom: 15px;
            border: none;
        }

        a {
            display: inline-block;
            margin: 10px 0;
            color: inherit;
            text-decoration: none;
            transition: color 0.2s ease;
        }

        a:hover {
            color: var(--link-dec-color);
        }

        .link-decoration {
            color: var(--link-dec-color); 
        }

        .btc-label {
            display: block;
            margin-top: 15px;
            color: var(--title-color);
        }

        .btc-address {
            font-size: 0.95rem; 
            color: var(--text-color);
            display: block;
            margin-top: 5px;
            overflow-wrap: break-word;
            word-break: break-all;
            user-select: all; 
            background: rgba(234, 221, 202, 0.2); =
            padding: 5px;
            border-radius: 4px;
        }

        .links-group {
            margin-bottom: 35px;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="Bow1440.png" alt="Sylvia Puffs logo">
        
        <div class="links-group">
            <h2>social</h2>
            <a href="https://x.com/sylviapuffs" target="_blank">
                <span class="link-decoration">/link/</span>twitter<span class="link-decoration">/*link/</span>
            </a>
            <br>
            <a href="https://github.com/BunPuffs" target="_blank">
                <span class="link-decoration">/link/</span>github<span class="link-decoration">/*link/</span>
            </a>
        </div>

        <div class="links-group">
            <h2>support</h2>
            <a href="https://ko-fi.com/sylviapuffs" target="_blank">
                <span class="link-decoration">/link/</span>ko-fi<span class="link-decoration">/*link/</span>
            </a>
            <span class="btc-label">btc:</span>
            <span class="btc-address">bc1qvks7cr3tgz6ntgqse6xjwtc8jkpkupzcax6xkt</span>
        </div>
    </div>
</body>
</html>
