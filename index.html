<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sylvia puffs</title>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #F7F2EE;
            --text-color: #5C4033;
            --title-color: #3E2C23;
            --link-dec-color: #EADDCA;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Baskerville', 'EB Garamond', serif;
            font-weight: 400;
            font-style: normal;
            text-align: center;
            text-transform: lowercase;
        }

        .container {
            margin-top: 10vh;
            max-width: 600px;
            padding: 20px;
        }

        img {
            width: 250px;
            height: auto;
            margin-bottom: 50px;
        }

        h2 {
            font-size: 1.1rem;
            color: var(--title-color);
            font-weight: 400;
            margin-bottom: 20px;
        }

        .links-group {
            margin-bottom: 40px;
        }

        a {
            display: block;
            margin: 10px 0;
            color: inherit;
            text-decoration: none;
        }

        .dec {
            color: var(--link-dec-color);
        }

        .btc-address {
            display: block;
            margin-top: 10px;
            font-size: 0.9rem;
            max-width: 100%;
            word-break: break-all;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="Bow1440.png" alt="logo">
        
        <div class="links-group">
            <h2>social</h2>
            <a href="https://x.com/sylviapuffs" target="_blank">
                <span class="dec">/link/</span>twitter<span class="dec">/*link/</span>
            </a>
            <a href="https://github.com/BunPuffs" target="_blank">
                <span class="dec">/link/</span>github<span class="dec">/*link/</span>
            </a>
        </div>

        <div class="links-group">
            <h2>support</h2>
            <a href="https://ko-fi.com/sylviapuffs" target="_blank">
                <span class="dec">/link/</span>ko-fi<span class="dec">/*link/</span>
            </a>
            <p>
                btc:<br>
                <span class="btc-address">bc1qvks7cr3tgz6ntgqse6xjwtc8jkpkupzcax6xkt</span>
            </p>
        </div>
    </div>
</body>
</html>
